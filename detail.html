<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品詳細 | 探究サイト</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <header>
        <h1>商品詳細・場所</h1>
    </header>
    
    <div class="nav-link" style="margin-top: 30px;">
        <a href="view.html" class="nav-button">一覧に戻る</a> 
    </div>

    <main id="detailMain">
        <div id="loading" class="loading-message">情報を読み込み中です...</div>
        
        <div id="content" style="display: none;">
            <div class="item-card" style="border-left: 15px solid var(--color-primary);">
                <h2 id="det-product" style="color: var(--color-primary); margin-bottom: 15px;"></h2>
                <p><strong>店舗名:</strong> <span id="det-store"></span></p>
                <p><strong>発見日時:</strong> <span id="det-date"></span></p>
            </div>

            <div style="margin-top: 30px; border-radius: 20px; overflow: hidden; border: 2px solid var(--color-border);">
                <iframe
                    id="map-frame"
                    width="100%"
                    height="400"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </main>

    <footer>© 探究サイト</footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="detail.js"></script>
</body>
</html>
